name: BookApp
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  carousel_slider: ^5.1.1
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^6.3.3
  go_router: ^17.0.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  dio: ^5.9.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icone_app.png"
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  intl_utils: ^2.8.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
flutter_intl:
  enabled: true
